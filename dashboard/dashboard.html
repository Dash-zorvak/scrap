<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Ejecutivo — Alcaldía de Santa Ana · Gustavo Acevedo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;
  --surface:#0b0b1a;
  --surface2:#111128;
  --border:#1a1a3e;
  --fg:#c8c8e0;
  --muted:#6b6b8a;
  --cyan:#00f0ff;
  --green:#00ff88;
  --amber:#ffb000;
  --red:#ff3355;
  --purple:#8860ff;
  --font-mono:'JetBrains Mono','SF Mono','Fira Code',ui-monospace,monospace;
  --font-sans:system-ui,-apple-system,sans-serif;
  --radius:6px;
}
html{font-size:14px}
body{
  background:var(--bg);color:var(--fg);font-family:var(--font-sans);
  min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased;
}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 4px 16px 4px;border-bottom:1px solid var(--border);margin-bottom:24px}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-family:var(--font-mono);font-size:13px;font-weight:400;color:var(--cyan);letter-spacing:0.5px;text-transform:uppercase}
.topbar h1 span{color:var(--muted)}
.topbar .date{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.nav-links{display:flex;gap:2px;margin-bottom:20px;flex-wrap:wrap}
.nav-links a{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);text-decoration:none;padding:8px 14px;border:1px solid transparent;border-radius:var(--radius);transition:.15s}
.nav-links a:hover{border-color:var(--border);color:var(--fg)}
.nav-links a.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,.06)}
.grid{display:grid;gap:12px}
.grid-main{grid-template-columns:2.2fr 1fr;gap:12px}
.grid-main-wide{grid-template-columns:1fr 1.8fr;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.engagement::before{background:var(--cyan)}
.kpi.sentiment::before{background:var(--green)}
.kpi.controversy::before{background:var(--amber)}
.kpi.effectiveness::before{background:var(--purple)}
.kpi.risk::before{background:var(--red)}
.kpi-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.kpi-value{font-family:var(--font-mono);font-size:24px;font-weight:500;letter-spacing:-0.5px}
.kpi.engagement .kpi-value{color:var(--cyan)}
.kpi.sentiment .kpi-value{color:var(--green)}
.kpi.controversy .kpi-value{color:var(--amber)}
.kpi.effectiveness .kpi-value{color:var(--purple)}
.kpi.risk .kpi-value{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--font-mono)}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface2);border-radius:var(--radius);padding:12px 14px;text-align:center}
.stat-card .num{font-family:var(--font-mono);font-size:20px;font-weight:500;color:var(--fg)}
.stat-card .lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-top:2px}
.data-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px}
.data-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:400}
.data-table td{padding:7px 10px;border-bottom:1px solid rgba(26,26,62,.5)}
.data-table tr:hover td{background:rgba(0,240,255,.03)}
.data-table .pos{color:var(--green)}
.data-table .neg{color:var(--red)}
.data-table .neu{color:var(--amber)}
.data-table .right{text-align:right}
.zone-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.zone-item{background:var(--surface2);border-radius:var(--radius);padding:12px;border-left:3px solid var(--border)}
.zone-item .z-name{font-family:var(--font-mono);font-size:12px;font-weight:500}
.zone-item .z-stats{font-size:10px;color:var(--muted);margin-top:3px}
.zone-item .z-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
.zone-item .z-bar-fill{height:100%;border-radius:2px;transition:width 1.5s}
.sentiment-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:8px 0}
.sentiment-bar .seg{height:100%}
.sentiment-bar .pos{background:var(--green)}
.sentiment-bar .neu{background:var(--amber)}
.sentiment-bar .neg{background:var(--red)}
.topic-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(26,26,62,.3)}
.topic-item:last-child{border-bottom:none}
.topic-item .t-name{font-family:var(--font-mono);font-size:11px}
.topic-item .t-val{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.scroll-y{overflow-y:auto;max-height:380px}
.mono{font-family:var(--font-mono)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-cyan{color:var(--cyan)}
.text-muted{color:var(--muted)}
@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.grid-main,.grid-main-wide{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kpi-grid{grid-template-columns:1fr 1fr}.kpi-value{font-size:18px}.topbar{flex-direction:column;align-items:flex-start;gap:8px}.stat-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>PANEL EJECUTIVO <span>//</span> ALCALDÍA DE SANTA ANA <span>·</span> GUSTAVO ACEVEDO</h1>
  </div>
  <div class="date" id="currentDate"></div>
</div>
<nav class="nav-links">
  <a href="dashboard.html" class="active">⬥ Dashboard</a>
  <a href="sentiment.html">⬥ Sentimiento</a>
  <a href="insights.html">⬥ Insights</a>
  <a href="indices.html">⬥ Índices</a>
  <a href="index.html">⬥ Inicio</a>
</nav>
<div id="app"></div>
<script src="data.js"></script>
<script>
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-SV',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function init() {
  const d = DASH_DATA;
  const m = MONTHLY_DATA;
  const months = Object.keys(m);
  const last12 = months.slice(-12);
  const rd = d.reactionDistribution;
  const totalR = d.totalReactions;

  const engData = last12.map(k => {
    const v = m[k];
    return +((v.reactions+v.comments+v.shares)/Math.max(v.views,1)*100).toFixed(1);
  });
  const engMax = engData.length ? Math.max(...engData) : 1;
  const engLabels = last12.map(k => k.slice(5)+'/'+k.slice(2,4));

  const reactItems = [
    {label:'Me gusta',val:rd.likes,pct:totalR?rd.likes/totalR*100:0,color:'var(--cyan)'},
    {label:'Me encanta',val:rd.loves,pct:totalR?rd.loves/totalR*100:0,color:'var(--green)'},
    {label:'Me divierte',val:rd.hahas,pct:totalR?rd.hahas/totalR*100:0,color:'var(--amber)'},
    {label:'Me asombra',val:rd.wows,pct:totalR?rd.wows/totalR*100:0,color:'var(--purple)'},
    {label:'Me entristece',val:rd.sads,pct:totalR?rd.sads/totalR*100:0,color:'#5599ff'},
    {label:'Me enoja',val:rd.angrys,pct:totalR?rd.angrys/totalR*100:0,color:'var(--red)'},
  ].sort((a,b)=>b.val-a.val);

  const zones = Object.entries(d.zones).sort((a,b)=>b[1].count-a[1].count);
  const maxZoneCount = zones.length ? Math.max(...zones.map(z=>z[1].count), 1) : 1;
  const topics = Object.entries(d.topics).sort((a,b)=>b[1].total_reactions-a[1].total_reactions);

  const contTopics = topics.map(([k,v]) => ({
    name:k, controversy:v.controversy, reactions:v.total_reactions
  })).sort((a,b)=>b.controversy-a.controversy);
  const maxControversy = contTopics.length ? contTopics[0].controversy || 0.01 : 0.01;

  const html = `
    <div class="kpi-grid">
      <div class="kpi engagement">
        <div class="kpi-label">Engagement</div>
        <div class="kpi-value">${d.indices.engagement.toFixed(1)}%</div>
        <div class="kpi-sub">${fmt(totalR)} reacc · ${fmt(d.totalComments)} coment</div>
      </div>
      <div class="kpi sentiment">
        <div class="kpi-label">Sentimiento Neto</div>
        <div class="kpi-value">${(d.indices.netSentiment*100).toFixed(1)}%</div>
        <div class="kpi-sub">${pct((rd.likes+rd.loves)/totalR)} pos · ${pct((rd.angrys+rd.sads)/totalR)} neg</div>
      </div>
      <div class="kpi controversy">
        <div class="kpi-label">Controversia</div>
        <div class="kpi-value">${(d.indices.controversy*100).toFixed(1)}%</div>
        <div class="kpi-sub">${fmt(rd.angrys+rd.sads)} reacc negativas</div>
      </div>
      <div class="kpi effectiveness">
        <div class="kpi-label">Efectividad</div>
        <div class="kpi-value">${(d.indices.effectiveness*100).toFixed(1)}%</div>
        <div class="kpi-sub">${fmt(rd.likes+rd.loves)} aprobaciones</div>
      </div>
      <div class="kpi risk">
        <div class="kpi-label">Riesgo Reputacional</div>
        <div class="kpi-value">${(d.indices.riskReputacional*100).toFixed(0)}%</div>
        <div class="kpi-sub">${d.indices.controversy<0.03?'Bajo':d.indices.controversy<0.08?'Medio':'Alto'}</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="num">${fmt(d.totalPosts)}</div><div class="lbl">Publicaciones</div></div>
      <div class="stat-card"><div class="num">${short(d.totalViews)}</div><div class="lbl">Visualizaciones</div></div>
      <div class="stat-card"><div class="num">${fmt(d.totalComments)}</div><div class="lbl">Comentarios</div></div>
      <div class="stat-card"><div class="num">${fmt(d.totalShares)}</div><div class="lbl">Compartidos</div></div>
    </div>

    <div class="grid grid-main">
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-title">Distribución de Reacciones · ${fmt(totalR)} totales</div>
          ${reactItems.map(r =>
            `<div class="topic-item">
              <span class="t-name"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${r.color};margin-right:8px;vertical-align:middle"></span>${r.label}</span>
              <span class="t-val">${fmt(r.val)} <span class="text-muted">(${r.pct.toFixed(1)}%)</span></span>
            </div>`
          ).join('')}
        </div>
        <div class="card">
          <div class="card-title">Engagement Mensual · ${engLabels[0]} → ${engLabels[engLabels.length-1]}</div>
          <div style="display:flex;align-items:flex-end;gap:3px;height:100px;padding:8px 0">
            ${engData.map((v,i) => `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <span class="mono" style="font-size:8px;color:var(--muted)">${v}%</span>
              <div style="width:100%;border-radius:2px;height:80px;position:relative;overflow:hidden;background:rgba(0,240,255,.08)">
                <div style="position:absolute;bottom:0;left:0;right:0;height:${v/engMax*100}%;background:linear-gradient(to top,var(--cyan),rgba(0,240,255,.35));border-radius:2px;transition:height 1.5s"></div>
              </div>
              <span class="mono" style="font-size:7px;color:var(--muted)">${engLabels[i]}</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-title">Tópicos · Ranking</div>
          <div class="scroll-y">
          ${topics.slice(0,10).map(([k,v]) => {
            const w = v.total_reactions/topics[0][1].total_reactions*100;
            return `<div class="topic-item"><span class="t-name">${k.replace(/_/g,' ')}</span><span class="t-val">${fmt(v.total_reactions)}</span></div>
            <div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:4px;overflow:hidden">
              <div style="width:${w}%;height:100%;background:var(--cyan);border-radius:2px;opacity:.6"></div>
            </div>`;
          }).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Distribución por Zona</div>
          <div class="zone-grid">
            ${zones.map(([k,v]) => {
              const p = v.count/maxZoneCount*100;
              const c = k==='Este'?'var(--cyan)':k==='Centro'?'var(--green)':k==='Sur'?'var(--amber)':k==='Norte'?'var(--purple)':'var(--muted)';
              return `<div class="zone-item">
                <div class="z-name">${k==='unknown'?'Sin especificar':k}</div>
                <div class="z-stats">${fmt(v.count)} pubs · ${fmt(v.likes+v.loves)} aprob · ${fmt(v.angrys+v.sads)} neg</div>
                <div class="z-bar"><div class="z-bar-fill" style="width:${p}%;background:${c}"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-main-wide" style="margin-top:12px">
      <div class="card">
        <div class="card-title">Controversia por Tópico</div>
        ${contTopics.slice(0,8).map(t => {
          const w = t.controversy/maxControversy*100;
          const c = t.controversy>0.03?'var(--red)':t.controversy>0.015?'var(--amber)':'var(--green)';
          return `<div class="topic-item">
            <span class="t-name">${t.name.replace(/_/g,' ')}</span>
            <span class="t-val" style="color:${c}">${(t.controversy*100).toFixed(2)}%</span>
          </div>
          <div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:4px;overflow:hidden">
            <div style="width:${w}%;height:100%;background:${c};border-radius:2px"></div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">Sentimiento por Tópico</div>
        ${topics.slice(0,10).map(([k,v]) => {
          const t = v.sentiment_pos+v.sentiment_neu+v.sentiment_neg;
          if(t===0)return'';
          return `<div class="topic-item" style="flex-direction:column;align-items:stretch;gap:3px;padding:5px 0">
            <div style="display:flex;justify-content:space-between">
              <span class="t-name">${k.replace(/_/g,' ')}</span>
              <span class="t-val">${(v.sentiment_pos/t*100).toFixed(0)}% pos / ${(v.sentiment_neg/t*100).toFixed(0)}% neg</span>
            </div>
            <div class="sentiment-bar" style="height:4px">
              <div class="seg pos" style="flex:${v.sentiment_pos/t*100}"></div>
              <div class="seg neu" style="flex:${v.sentiment_neu/t*100}"></div>
              <div class="seg neg" style="flex:${v.sentiment_neg/t*100}"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="margin-top:16px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:8px">
      <span class="mono" style="font-size:10px;color:var(--muted)">DATOS: ${d.dateRange.from.slice(0,10)} → ${d.dateRange.to.slice(0,10)} · ${fmt(d.totalPosts)} pubs · ${fmt(d.totalReactions)} reacc · ${fmt(d.totalViews)} views</span>
      <span class="mono" style="font-size:9px;color:var(--muted)">FUENTE: Facebook · Alcaldía de Santa Ana · Gustavo Acevedo</span>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}
init();
</script>
</body>
</html>
