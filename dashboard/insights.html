<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Explorador de Insights — Jose Chicas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;
  --surface:#0b0b1a;
  --surface2:#111128;
  --border:#1a1a3e;
  --fg:#c8c8e0;
  --muted:#6b6b8a;
  --cyan:#00f0ff;
  --green:#00ff88;
  --amber:#ffb000;
  --red:#ff3355;
  --purple:#8860ff;
  --blue:#5599ff;
  --font-mono:'JetBrains Mono','SF Mono','Fira Code',ui-monospace,monospace;
  --font-sans:system-ui,-apple-system,sans-serif;
  --radius:6px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 4px 16px;border-bottom:1px solid var(--border);margin-bottom:24px}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-family:var(--font-mono);font-size:13px;font-weight:400;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase}
.topbar h1 span{color:var(--muted)}
.nav-links{display:flex;gap:2px;margin-bottom:20px;flex-wrap:wrap}
.nav-links a{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-decoration:none;padding:8px 14px;border:1px solid transparent;border-radius:var(--radius);transition:.15s}
.nav-links a:hover{border-color:var(--border);color:var(--fg)}
.nav-links a.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,.06)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-main{grid-template-columns:1.5fr 1.5fr;gap:12px}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--fg);font-family:var(--font-mono);font-size:13px;width:100%;outline:none;transition:.15s}
.search-box:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.1)}
.search-box::placeholder{color:var(--muted);opacity:.6}
.keyword-cloud{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.keyword-tag{padding:4px 10px;border-radius:4px;font-family:var(--font-mono);font-size:10px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--fg);transition:.15s}
.keyword-tag:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.06)}
.keyword-tag.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.12)}
.insight-card{background:var(--surface2);border-radius:var(--radius);padding:14px;border-left:3px solid var(--cyan);margin-bottom:8px}
.insight-card .i-word{font-family:var(--font-mono);font-size:16px;font-weight:500;color:var(--cyan)}
.insight-card .i-text{font-size:11px;color:var(--muted);margin-top:3px}
.insight-card .i-stats{display:flex;gap:12px;margin-top:6px;font-family:var(--font-mono);font-size:10px;flex-wrap:wrap}
.topic-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(26,26,62,.3)}
.topic-item:last-child{border-bottom:none}
.topic-item .t-name{font-family:var(--font-mono);font-size:11px}
.topic-item .t-val{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.mono{font-family:var(--font-mono)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-cyan{color:var(--cyan)}
.text-muted{color:var(--muted)}
.bar-h{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin:3px 0}
.bar-h .fill{height:100%;border-radius:2px}
@media(max-width:1024px){.grid-main,.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){.topbar{flex-direction:column;align-items:flex-start;gap:8px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>INSIGHTS <span>//</span> JOSE CHICAS <span>·</span> SAN SALVADOR ESTE</h1>
  </div>
  <div class="mono" style="font-size:11px;color:var(--muted)" id="currentDate"></div>
</div>
<nav class="nav-links">
  <a href="dashboard.html">⬥ Dashboard</a>
  <a href="sentiment.html">⬥ Sentimiento</a>
  <a href="insights.html" class="active">⬥ Insights</a>
  <a href="indices.html">⬥ Índices</a>
  <a href="index.html">⬥ Inicio</a>
</nav>
<div id="app"></div>
<script src="data.js"></script>
<script>
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-SV',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function init(){
  const d = DASH_DATA;
  const rd = d.reactionDistribution;
  const totalR = d.totalReactions;
  const keywords = Object.entries(d.keywordInsights || {});
  const topKW = Object.entries(d.topKeywords || {}).slice(0,60);

  function render(selectedWord) {
    // Get the keyword insight for the selected word
    let insight = null;
    let wordData = null;
    if (selectedWord && d.keywordInsights[selectedWord]) {
      wordData = d.keywordInsights[selectedWord];
      const tr = wordData.reactions || 1;
      insight = {
        word: selectedWord,
        count: wordData.count,
        likes: wordData.likes,
        loves: wordData.loves,
        angrys: wordData.angrys,
        sads: wordData.sads,
        comments: wordData.comments,
        shares: wordData.shares,
        views: wordData.views,
        posPct: ((wordData.likes+wordData.loves)/tr*100).toFixed(1),
        negPct: ((wordData.angrys+wordData.sads)/tr*100).toFixed(1),
        netSentiment: ((wordData.likes+wordData.loves-wordData.angrys-wordData.sads)/tr*100).toFixed(1),
        dominantReaction: wordData.angrys > wordData.loves ? 'enojo' : wordData.sads > wordData.loves/2 ? 'tristeza' : 'aprobación'
      };
    }

    const html = `
      <div class="card">
        <div class="card-title">Explorador de Palabras Clave</div>
        <p style="font-size:11px;color:var(--muted);margin-bottom:10px">Seleccioná una palabra para ver cómo reacciona la audiencia. Cada etiqueta representa un término extraído de las publicaciones.</p>
        <input type="text" class="search-box" id="kwSearch" placeholder="Buscar palabra clave…" value="${selectedWord||''}">
        <div class="keyword-cloud" id="keywordCloud">
          ${topKW.map(([w,c]) => {
            const size = Math.max(9, Math.min(16, 8 + c/topKW[0][1]*10));
            const sel = w === selectedWord ? ' selected' : '';
            return `<button class="keyword-tag${sel}" data-word="${w}" style="font-size:${size}px">${w}</button>`;
          }).join('')}
        </div>
      </div>

      ${insight ? `
      <div class="card">
        <div class="card-title">Análisis Detallado: «${insight.word}»</div>
        <div class="insight-card">
          <div class="i-word">${insight.word}</div>
          <div class="i-text">Mencionado en ${fmt(insight.count)} publicaciones · Generó ${fmt(insight.likes+insight.loves+insight.angrys+insight.sads)} reacciones · ${short(insight.views)} visualizaciones</div>
          <div class="i-stats">
            <span style="color:var(--green)">👍 ${fmt(insight.likes+insight.loves)} (${insight.posPct}%)</span>
            <span style="color:var(--red)">👎 ${fmt(insight.angrys+insight.sads)} (${insight.negPct}%)</span>
            <span style="color:var(--amber)">💬 ${fmt(insight.comments)} comentarios</span>
            <span style="color:var(--cyan)">🔄 ${fmt(insight.shares)} compartidos</span>
          </div>
        </div>

        <div style="margin-top:10px;padding:12px;background:var(--surface2);border-radius:var(--radius)">
          <div class="card-title" style="margin-bottom:6px">Desglose de Reacciones</div>
          ${[
            {l:'Me gusta', v:insight.likes, c:'var(--cyan)'},
            {l:'Me encanta', v:insight.loves, c:'var(--green)'},
            {l:'Me enoja', v:insight.angrys, c:'var(--red)'},
            {l:'Me entristece', v:insight.sads, c:'var(--blue)'},
          ].map(r => {
            const pct = insight.likes+insight.loves+insight.angrys+insight.sads > 0 ? r.v/(insight.likes+insight.loves+insight.angrys+insight.sads)*100 : 0;
            return `<div class="topic-item">
              <span class="t-name"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${r.c};margin-right:6px;vertical-align:middle"></span>${r.l}</span>
              <span class="t-val">${fmt(r.v)} (${pct.toFixed(1)}%)</span>
            </div>
            <div class="bar-h"><div class="fill" style="width:${pct}%;background:${r.c}"></div></div>`;
          }).join('')}
        </div>

        <div class="insight-card" style="border-left-color:var(--amber);margin-top:10px">
          <div class="i-word" style="font-size:12px;color:var(--amber);font-weight:400">⚡ Insight Generado</div>
          <div class="i-text" style="font-size:12px;color:var(--fg);margin-top:6px">
            La palabra <strong style="color:var(--cyan)">«${insight.word}»</strong> aparece en ${fmt(insight.count)} publicaciones y provoca un sentimiento neto de 
            <strong style="color:${insight.netSentiment > 0 ? 'var(--green)' : 'var(--red)'}">${insight.netSentiment > 0 ? '+' : ''}${insight.netSentiment}%</strong>.
            La reacción dominante es <strong style="color:${insight.negPct > insight.posPct ? 'var(--red)' : 'var(--green)'}">${insight.dominantReaction}</strong>
            con ${fmt(insight.negPct > 50 ? insight.angrys+insight.sads : insight.likes+insight.loves)} reacciones.
            En total generó ${short(insight.views)} visualizaciones y ${fmt(insight.comments)} comentarios.
          </div>
        </div>
      </div>
      ` : `
      <div class="card">
        <div class="card-title">Seleccioná una palabra clave</div>
        <p style="font-size:12px;color:var(--muted)">Hacé clic en cualquier etiqueta de la nube para ver el análisis detallado de cómo reacciona la audiencia a ese término.</p>
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
          ${keywords.sort((a,b)=>b[1].count-a[1].count).slice(0,12).map(([w,ki]) => {
            const tr = ki.reactions||1;
            const ns = ((ki.likes+ki.loves-ki.angrys-ki.sads)/tr*100).toFixed(1);
            return `<div style="background:var(--surface2);border-radius:var(--radius);padding:12px;border:1px solid var(--border);cursor:pointer" onclick="window.location='?q=${encodeURIComponent(w)}'" class="keyword-tag" style="display:block">
              <div class="mono" style="font-size:14px;color:var(--cyan)">${w}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:3px">${fmt(ki.count)} pubs · ${fmt(ki.likes+ki.loves)} aprob · ${fmt(ki.angrys+ki.sads)} neg</div>
              <div style="font-size:10px;font-family:var(--font-mono);color:${ns>0?'var(--green)':'var(--red)'};margin-top:2px">Sentimiento neto: ${ns}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      `}

      <div class="card">
        <div class="card-title">Palabras Clave Más Frecuentes</div>
        <div class="scroll-y" style="max-height:300px">
        ${topKW.slice(0,40).map(([w,c], i) => {
          const pct = c/topKW[0][1]*100;
          return `<div class="topic-item">
            <span class="t-name">${i+1}. ${w}</span>
            <span class="t-val">${fmt(c)} menciones</span>
          </div>
          <div class="bar-h"><div class="fill" style="width:${pct}%;background:var(--cyan);opacity:.6"></div></div>`;
        }).join('')}
        </div>
      </div>

      <div style="padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:8px">
        <span class="mono" style="font-size:10px;color:var(--muted)">${topKW.length} palabras clave analizadas · Extraídas de ${fmt(d.totalPosts)} publicaciones</span>
        <span class="mono" style="font-size:9px;color:var(--muted)">ANÁLISIS: Correlación palabra → reacción en comentarios y reacciones</span>
      </div>
    `;
    document.getElementById('app').innerHTML = html;

    // Bind search
    document.getElementById('kwSearch')?.addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      const tags = document.querySelectorAll('.keyword-tag');
      tags.forEach(t => {
        const w = t.dataset.word;
        t.style.display = !q || w.includes(q) ? 'inline-block' : 'none';
      });
    });

    // Bind keyword clicks
    document.querySelectorAll('.keyword-tag[data-word]').forEach(el => {
      el.addEventListener('click', () => {
        window.location.href = '?q=' + encodeURIComponent(el.dataset.word);
      });
    });
  }

  // Read URL param
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  render(q || null);
}
init();
</script>
</body>
</html>
